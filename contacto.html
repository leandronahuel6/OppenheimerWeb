<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contacto | Oppenheimer</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Roboto:wght@300;400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/styles.css">
    
    <style>
        .contact-form { max-width: 600px; margin: 0 auto; background: #111; padding: 3rem; border-radius: 8px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .form-group { margin-bottom: 1.5rem; text-align: left; }
        .form-group label { display: block; margin-bottom: 0.5rem; color: var(--text-muted); font-size: 0.9rem; }
        .form-group input, .form-group textarea {
            width: 100%; padding: 10px; background: #050505; border: 1px solid #333; color: white; border-radius: 4px; font-family: var(--font-body);
        }
        .form-group input:focus, .form-group textarea:focus { outline: none; border-color: var(--accent-color); }
        .submit-btn {
            background: transparent; color: var(--accent-color); border: 1px solid var(--accent-color); padding: 12px 30px; font-family: var(--font-title); font-size: 1.1rem; cursor: pointer; transition: var(--transition); width: 100%; text-transform: uppercase; letter-spacing: 2px;
        }
        .submit-btn:hover { background: var(--accent-color); color: #000; }
    </style>
</head>
<body>

    <header>
        <nav class="nav-container">
            <a href="index.html" class="logo">OPPENHEIMER</a>
            <ul class="nav-links">
                <li><a href="index.html">Inicio</a></li>
                <li><a href="sobre.html">Sobre la Película</a></li>
                <li><a href="galeria.html">Galería</a></li>
                <li><a href="premios.html">Premios</a></li>
                <li><a href="barbenheimer.html">Barbenheimer</a></li>
                <li><a href="contacto.html" style="color: var(--accent-color);">Contacto</a></li>
            </ul>
            <button class="hamburger" aria-label="Menú">
                <span></span><span></span><span></span>
            </button>
        </nav>
    </header>

    <main>
        <div class="page-header">
            <h1 class="page-title">Contacto</h1>
            <p style="color: var(--text-muted); margin-top: 10px;">Comunícate con el equipo de prensa o producción.</p>
        </div>
        
        <section class="container">
            <form class="contact-form" action="#" method="POST">
                <div class="form-group">
                    <label for="name">Nombre</label>
                    <input type="text" id="name" name="name" required>
                </div>
                <div class="form-group">
                    <label for="email">Correo Electrónico</label>
                    <input type="email" id="email" name="email" required>
                </div>
                <div class="form-group">
                    <label for="message">Mensaje</label>
                    <textarea id="message" name="message" rows="5" required></textarea>
                </div>
                <button type="submit" class="submit-btn">Enviar Mensaje</button>
            </form>
        </section>
    </main>

    <footer>
        <p>&copy; 2026 Proyecto Educativo/Portafolio. Sitio no oficial de la película Oppenheimer.</p>
    </footer>

    <script src="js/script.js"></script>
</body>
</html>
